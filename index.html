<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Finance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="login card" id="loginBox">
<h1>💰 Family Finance</h1>
<p>Kelola keuangan suami & istri</p>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<div id="app" style="display:none">
<div class="header card">
<h2 id="welcome"></h2>
<p>Laporan Hari Ini</p>
</div>

<div class="stats">
<div class="card">
<h4>Pemasukan</h4>
<span id="masuk">Rp0</span>
</div>

<div class="card">
<h4>Pengeluaran</h4>
<span id="keluar">Rp0</span>
</div>

<div class="card">
<h4>Saldo</h4>
<span id="saldo">Rp0</span>
</div>

<div class="card">
<h4>Transaksi</h4>
<span id="jml">0</span>
</div>
</div>

<div class="card">
<h3>Ringkasan Kategori</h3>
<div id="kategoriLaporan"></div>
</div>

<div class="card">
<h3>Tambah Transaksi</h3>

<input type="date" id="tanggal">

<select id="jenis" onchange="kategoriUpdate()">
<option>Pengeluaran</option>
<option>Pemasukan</option>
</select>

<select id="kategori"></select>

<input id="keterangan" placeholder="Keterangan">
<input id="nominal" placeholder="Nominal">

<button id="saveBtn" onclick="simpan()">
Simpan
</button>
</div>

<div class="card">
<h3>Riwayat</h3>
<div id="riwayat"></div>
</div>

</div>

<div id="toast"></div>

</div>

<script src="script.js"></script>

</body>
</html>
